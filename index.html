<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blueprint's Masters</title>
<style>
  *{box-sizing:border-box;}
  html, body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
    font-family:sans-serif;
  }

  /* Bühne füllt den kompletten Bildschirm, kein Rand */
  .stage{
    position:fixed;
    inset:0;
    width:100vw;
    height:100vh;
    overflow:hidden;
  }
  .stage img{
    position:absolute;
    top:0;
    left:0;
    display:block;
    user-select:none;
    -webkit-user-drag:none;
  }

  /* unsichtbare, aber drückbare Klick-Flächen über den Buttons im Bild;
     Position wird per JS passend zum jeweils sichtbaren Bildausschnitt gesetzt */
  .hit{
    position:absolute;
    cursor:pointer;
    background:rgba(255,255,255,0);
    transition:transform .08s ease, background .08s ease;
    border-radius:2%;
  }
  .hit:active,
  .hit.pressed{
    transform:scale(0.95) translateY(3px);
  }
  .hit:focus-visible{
    outline:3px solid #fff;
    outline-offset:2px;
  }

  /* kleines "Kopiert!"-Badge über dem Kopieren-Button */
  .toast{
    position:absolute;
    left:50%;
    top:-14px;
    transform:translate(-50%,-100%) scale(.8);
    background:#1c1c1c;
    color:#fff;
    font-size:clamp(10px, 1.3vw, 14px);
    padding:6px 10px;
    border-radius:4px;
    opacity:0;
    pointer-events:none;
    transition:opacity .15s ease, transform .15s ease;
    white-space:nowrap;
  }
  .toast.show{
    opacity:1;
    transform:translate(-50%,-130%) scale(1);
  }

  /* Impressum-Knopf unten links */
  .imprint-btn{
    position:absolute;
    left:2%;
    bottom:2%;
    width:6%;
    aspect-ratio:1/1;
    min-width:34px;
    min-height:34px;
    border-radius:50%;
    background:#2b2b2b;
    color:#fff;
    border:2px solid #eee;
    font-family:inherit;
    font-weight:bold;
    font-size:clamp(14px, 2vw, 20px);
    line-height:1;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    box-shadow:0 3px 0 rgba(0,0,0,.5);
    transition:transform .08s ease;
    z-index:5;
  }
  .imprint-btn:hover{background:#3a3a3a;}
  .imprint-btn:active,
  .imprint-btn.pressed{
    transform:scale(0.92) translateY(2px);
    box-shadow:0 1px 0 rgba(0,0,0,.5);
  }
  .imprint-btn:focus-visible{
    outline:3px solid #fff;
    outline-offset:2px;
  }

  /* Impressum-Overlay */
  .imprint-overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.65);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
    opacity:0;
    pointer-events:none;
    transition:opacity .15s ease;
    z-index:10;
  }
  .imprint-overlay.open{
    opacity:1;
    pointer-events:auto;
  }
  .imprint-box{
    background:#1c1c1c;
    color:#eee;
    max-width:520px;
    width:100%;
    max-height:80vh;
    overflow-y:auto;
    padding:26px 24px;
    border-radius:6px;
    border:2px solid #444;
    font-family:sans-serif;
    line-height:1.5;
    position:relative;
  }
  .imprint-box h2{
    margin:0 0 14px;
    font-size:1.2rem;
  }
  .imprint-box p{margin:0 0 10px; font-size:.92rem;}
  .imprint-close{
    position:absolute;
    top:10px;
    right:10px;
    background:transparent;
    border:none;
    color:#eee;
    font-size:1.3rem;
    cursor:pointer;
    padding:4px 10px;
  }
  .imprint-close:hover{color:#fff;}
</style>
</head>

<!-- Impressum-Fenster -->
<div class="imprint-overlay" id="imprintOverlay">
  <div class="imprint-box">
    <button class="imprint-close" id="imprintClose" aria-label="Schließen">✕</button>
    <h2>Impressum</h2>
    <p>/pay _____</p>
  </div>
</div>

<script>
  // Positioniert Bild + Klick-Flächen exakt zueinander –
  // mit kleinem Extra-Zoom, damit auch minimale Restränder verschwinden.
  const IMG_W = 1536, IMG_H = 1024; // Originalgröße des Hintergrundbildes
  const CROP_FACTOR = 1.06; // 6% extra hineinzoomen, um Ränder wegzuschneiden
  const bgImg = document.getElementById('bgImg');
  const hits = document.querySelectorAll('.hit[data-box]');

  function layoutHits(){
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    const scale = Math.max(vw / IMG_W, vh / IMG_H) * CROP_FACTOR;
    const dispW = IMG_W * scale;
    const dispH = IMG_H * scale;
    const offX = (vw - dispW) / 2;
    const offY = (vh - dispH) / 2;

    bgImg.style.width  = dispW + 'px';
    bgImg.style.height = dispH + 'px';
    bgImg.style.left   = offX + 'px';
    bgImg.style.top    = offY + 'px';

    hits.forEach(el => {
      const [fx0, fy0, fx1, fy1] = el.dataset.box.split(',').map(Number);
      el.style.left   = (offX + fx0 * dispW) + 'px';
      el.style.top    = (offY + fy0 * dispH) + 'px';
      el.style.width  = ((fx1 - fx0) * dispW) + 'px';
      el.style.height = ((fy1 - fy0) * dispH) + 'px';
    });
  }

  layoutHits();
  window.addEventListener('resize', layoutHits);
  window.addEventListener('orientationchange', layoutHits);

  const copyBtn = document.getElementById('copyBtn');
  const toast = document.getElementById('toast');
  const serverIp = 'donutsmp.net'; // 🔧 HIER Server-IP anpassen, falls sie sich ändert

  copyBtn.addEventListener('click', async () => {
    try{
      await navigator.clipboard.writeText(serverIp);
    }catch(e){
      const ta = document.createElement('textarea');
      ta.value = serverIp;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
    }
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1200);
  });

  // Impressum öffnen / schließen
  const imprintBtn = document.getElementById('imprintBtn');
  const imprintOverlay = document.getElementById('imprintOverlay');
  const imprintClose = document.getElementById('imprintClose');

  function openImprint(){ imprintOverlay.classList.add('open'); }
  function closeImprint(){ imprintOverlay.classList.remove('open'); }

  imprintBtn.addEventListener('click', openImprint);
  imprintClose.addEventListener('click', closeImprint);
  imprintOverlay.addEventListener('click', e => {
    if(e.target === imprintOverlay) closeImprint();
  });
  document.addEventListener('keydown', e => {
    if(e.key === 'Escape') closeImprint();
  });

  // Tastatur-Bedienung: Enter/Space visuell wie ein Klick behandeln
  document.querySelectorAll('.hit').forEach(el => {
    el.addEventListener('keydown', e => {
      if(e.key === 'Enter' || e.key === ' ') el.classList.add('pressed');
    });
    el.addEventListener('keyup', () => el.classList.remove('pressed'));
  });
</script>
