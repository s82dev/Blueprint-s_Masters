<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blueprint's Masters</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  :root{
    --sky-top:#4a90d9;
    --sky-bottom:#bfe3f5;
    --gold:#f7b731;
    --gold-dark:#a86d0f;
    --blue:#38b6ff;
    --blue-dark:#1b6fa8;
    --discord:#5865f2;
    --discord-dark:#333bb0;
    --youtube:#e33232;
    --youtube-dark:#8f1717;
    --tiktok:#161616;
    --tiktok-dark:#000000;
    --twitch:#8b5cf6;
    --twitch-dark:#5a34a8;
    --panel:#8a8a8a;
    --panel-dark:#4d4d4d;
    --wood:#7a4a2b;
    --wood-dark:#4a2c18;
    --ink:#1c1c1c;
  }

  *{box-sizing:border-box;}

  body{
    margin:0;
    min-height:100vh;
    font-family:'Press Start 2P', monospace;
    background:
      linear-gradient(180deg, var(--sky-top) 0%, var(--sky-bottom) 55%, #6fae52 56%, #3f7d3a 100%);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:40px 16px;
    position:relative;
    overflow-x:hidden;
    image-rendering:pixelated;
  }

  /* deko-blöcke im hintergrund, damit es nicht leer wirkt */
  body::before, body::after{
    content:"";
    position:fixed;
    width:120px;height:120px;
    background:#8b6b3d;
    border:6px solid #5c4425;
    opacity:.35;
    z-index:0;
  }
  body::before{top:-30px;left:-30px;transform:rotate(8deg);}
  body::after{bottom:-40px;right:-40px;transform:rotate(-6deg);background:#5c8f4a;border-color:#345a29;}

  .card{
    position:relative;
    z-index:1;
    width:100%;
    max-width:900px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:22px;
  }

  h1{
    margin:0;
    text-align:center;
    line-height:1.5;
    font-size:clamp(1.4rem, 5vw, 3rem);
    letter-spacing:2px;
  }
  h1 .line1{
    display:block;
    color:var(--blue);
    -webkit-text-stroke:3px var(--ink);
    text-shadow:4px 4px 0 var(--blue-dark), 8px 8px 0 rgba(0,0,0,.25);
  }
  h1 .line2{
    display:block;
    color:var(--gold);
    -webkit-text-stroke:3px var(--ink);
    text-shadow:4px 4px 0 var(--gold-dark), 8px 8px 0 rgba(0,0,0,.25);
  }

  .btn-row{
    width:100%;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:16px;
  }
  .btn-row.single{grid-template-columns:1fr;}

  .btn{
    --face:#38b6ff;
    --edge:#1b6fa8;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:14px;
    padding:18px 14px;
    color:#fff;
    text-decoration:none;
    font-family:inherit;
    font-size:clamp(.8rem, 2vw, 1rem);
    letter-spacing:1px;
    background:var(--face);
    border:none;
    border-radius:6px;
    box-shadow:
      inset 0 -6px 0 var(--edge),
      inset 0 3px 0 rgba(255,255,255,.25),
      0 6px 0 rgba(0,0,0,.35);
    cursor:pointer;
    transform:translateY(0);
    transition:transform .06s ease;
    user-select:none;
  }
  .btn:hover{filter:brightness(1.08);}
  .btn:active,
  .btn.pressed{
    transform:translateY(6px);
    box-shadow:
      inset 0 -2px 0 var(--edge),
      inset 0 3px 0 rgba(255,255,255,.15),
      0 0 0 rgba(0,0,0,0);
  }
  .btn:focus-visible{
    outline:3px solid #fff;
    outline-offset:3px;
  }

  .btn svg{width:24px;height:24px;flex:none;fill:#fff;}

  .btn.discord{--face:var(--discord); --edge:var(--discord-dark);}
  .btn.youtube{--face:var(--youtube); --edge:var(--youtube-dark);}
  .btn.tiktok{--face:var(--tiktok); --edge:var(--tiktok-dark);}
  .btn.twitch{--face:var(--twitch); --edge:var(--twitch-dark);}

  .ip-panel{
    width:100%;
    background:var(--panel);
    border:6px solid #d9d9d9;
    outline:6px solid var(--panel-dark);
    border-radius:4px;
    padding:22px 20px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:16px;
  }
  .ip-panel .label{
    color:#1e1e1e;
    font-size:.85rem;
    letter-spacing:2px;
  }
  .ip-row{
    width:100%;
    display:flex;
    gap:12px;
    flex-wrap:wrap;
  }
  .ip-value{
    flex:1 1 260px;
    background:#111;
    color:#fff;
    border:none;
    border-radius:4px;
    padding:16px;
    font-family:inherit;
    font-size:clamp(.85rem, 2vw, 1.1rem);
    box-shadow:inset 0 3px 0 rgba(0,0,0,.6);
  }
  .copy-btn{
    flex:0 0 auto;
    background:var(--twitch);
    border:none;
    border-radius:4px;
    color:#fff;
    font-family:inherit;
    font-size:.85rem;
    padding:16px 20px;
    cursor:pointer;
    box-shadow:
      inset 0 -6px 0 var(--twitch-dark),
      0 6px 0 rgba(0,0,0,.35);
    transition:transform .06s ease;
  }
  .copy-btn:active{
    transform:translateY(6px);
    box-shadow:inset 0 -2px 0 var(--twitch-dark);
  }
  .copy-btn.copied{background:#3faa4a; box-shadow:inset 0 -6px 0 #1f6b28, 0 6px 0 rgba(0,0,0,.35);}

  .footer-tag{
    display:flex;
    align-items:center;
    gap:10px;
    background:var(--wood);
    border:4px solid var(--wood-dark);
    color:#f3d9a8;
    padding:10px 22px;
    border-radius:4px;
    font-size:.75rem;
    letter-spacing:1px;
  }

  @media (max-width:520px){
    .btn-row{grid-template-columns:1fr;}
  }

  @media (prefers-reduced-motion:reduce){
    .btn, .copy-btn{transition:none;}
  }
</style>
</head>
<body>

<div class="card">

  <h1>
    <span class="line1">Blueprint's</span>
    <span class="line2">Masters</span>
  </h1>

  <div class="btn-row single">
    <!-- 🔗 HIER DEN ECHTEN DISCORD-LINK EINTRAGEN -->
    <a class="btn discord" href="https://discord.gg/DEIN-INVITE" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24"><path d="M20.3 4.4A19.7 19.7 0 0 0 15.6 3c-.2.4-.5.9-.7 1.3a18 18 0 0 0-5.8 0A13 13 0 0 0 8.4 3a19.7 19.7 0 0 0-4.7 1.4C1 8.7.3 12.9.6 17c1.9 1.4 3.8 2.3 5.6 2.9.5-.6.9-1.3 1.2-2a12 12 0 0 1-1.9-.9l.5-.4c3.6 1.7 7.5 1.7 11 0l.5.4c-.6.4-1.2.7-1.9.9.3.7.7 1.4 1.2 2 1.8-.6 3.7-1.5 5.6-2.9.4-4.7-.8-8.9-2.1-12.6ZM8.7 14.4c-1.1 0-2-1-2-2.2s.9-2.2 2-2.2 2 1 2 2.2-.9 2.2-2 2.2Zm6.6 0c-1.1 0-2-1-2-2.2s.9-2.2 2-2.2 2 1 2 2.2-.9 2.2-2 2.2Z"/></svg>
      Discord
    </a>
  </div>

  <div class="btn-row">
    <!-- 🔗 YouTube Kanal 1 -->
    <a class="btn youtube" href="https://youtube.com/@DEIN-KANAL-1" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24"><path d="M23 12s0-3.6-.5-5.3a3 3 0 0 0-2.1-2.1C18.7 4 12 4 12 4s-6.7 0-8.4.6A3 3 0 0 0 1.5 6.7C1 8.4 1 12 1 12s0 3.6.5 5.3a3 3 0 0 0 2.1 2.1C5.3 20 12 20 12 20s6.7 0 8.4-.6a3 3 0 0 0 2.1-2.1c.5-1.7.5-5.3.5-5.3ZM9.7 15.5V8.5L15.8 12l-6.1 3.5Z"/></svg>
      YouTube
    </a>
    <!-- 🔗 YouTube Kanal 2 -->
    <a class="btn youtube" href="https://youtube.com/@DEIN-KANAL-2" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24"><path d="M23 12s0-3.6-.5-5.3a3 3 0 0 0-2.1-2.1C18.7 4 12 4 12 4s-6.7 0-8.4.6A3 3 0 0 0 1.5 6.7C1 8.4 1 12 1 12s0 3.6.5 5.3a3 3 0 0 0 2.1 2.1C5.3 20 12 20 12 20s6.7 0 8.4-.6a3 3 0 0 0 2.1-2.1c.5-1.7.5-5.3.5-5.3ZM9.7 15.5V8.5L15.8 12l-6.1 3.5Z"/></svg>
      YouTube
    </a>
  </div>

  <div class="btn-row">
    <!-- 🔗 TikTok Kanal 1 -->
    <a class="btn tiktok" href="https://tiktok.com/@DEIN-TIKTOK-1" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24"><path d="M16.6 3c.4 2.3 1.9 3.8 4.4 4v3c-1.5 0-2.9-.5-4.1-1.3v6.4a6.4 6.4 0 1 1-6.4-6.4c.3 0 .6 0 .9.1v3.1a3.3 3.3 0 1 0 2.3 3.2V3h2.9Z"/></svg>
      TikTok
    </a>
    <!-- 🔗 TikTok Kanal 2 -->
    <a class="btn tiktok" href="https://tiktok.com/@DEIN-TIKTOK-2" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24"><path d="M16.6 3c.4 2.3 1.9 3.8 4.4 4v3c-1.5 0-2.9-.5-4.1-1.3v6.4a6.4 6.4 0 1 1-6.4-6.4c.3 0 .6 0 .9.1v3.1a3.3 3.3 0 1 0 2.3 3.2V3h2.9Z"/></svg>
      TikTok
    </a>
  </div>

  <div class="btn-row">
    <!-- 🔗 Twitch Kanal 1 -->
    <a class="btn twitch" href="https://twitch.tv/DEIN-TWITCH-1" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24"><path d="M4 2 2.5 5.5v14H7V22l3.5-2.5H14L20.5 13V2H4Zm14.5 10-3 3H12l-2.5 2.5V15H6.5V4h12v8Z"/><path d="M15.5 6.5h2v4.5h-2z"/><path d="M10.5 6.5h2v4.5h-2z"/></svg>
      Twitch
    </a>
    <!-- 🔗 Twitch Kanal 2 -->
    <a class="btn twitch" href="https://twitch.tv/DEIN-TWITCH-2" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24"><path d="M4 2 2.5 5.5v14H7V22l3.5-2.5H14L20.5 13V2H4Zm14.5 10-3 3H12l-2.5 2.5V15H6.5V4h12v8Z"/><path d="M15.5 6.5h2v4.5h-2z"/><path d="M10.5 6.5h2v4.5h-2z"/></svg>
      Twitch
    </a>
  </div>

  <div class="ip-panel">
    <div class="label">Server IP</div>
    <div class="ip-row">
      <input class="ip-value" id="serverIp" type="text" value="donutsmp.net" readonly>
      <button class="copy-btn" id="copyBtn" type="button">Kopieren</button>
    </div>
  </div>

  <div class="footer-tag">
    <span>📘</span> Blueprint's Masters <span>📘</span>
  </div>

</div>

<script>
  // Kopier-Button für die Server-IP
  const copyBtn = document.getElementById('copyBtn');
  const ipField = document.getElementById('serverIp');

  copyBtn.addEventListener('click', async () => {
    try{
      await navigator.clipboard.writeText(ipField.value);
    }catch(e){
      ipField.select();
      document.execCommand('copy');
    }
    const original = copyBtn.textContent;
    copyBtn.textContent = 'Kopiert!';
    copyBtn.classList.add('copied');
    setTimeout(() => {
      copyBtn.textContent = original;
      copyBtn.classList.remove('copied');
    }, 1500);
  });

  // Tastatur-Bedienung: Enter/Space auf Buttons wie Klick aussehen lassen
  document.querySelectorAll('.btn').forEach(btn => {
    btn.addEventListener('keydown', e => {
      if(e.key === 'Enter' || e.key === ' '){
        btn.classList.add('pressed');
      }
    });
    btn.addEventListener('keyup', () => btn.classList.remove('pressed'));
  });
</script>

</body>
</html>
