<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blueprint's Masters</title>
<style>
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#0d0d0d;
    font-family:sans-serif;
  }

  /* Wrapper hält das Seitenverhältnis des Bildes (1536 x 1024) fest,
     damit die %-Positionen der Buttons bei jeder Bildschirmgröße stimmen */
  .stage{
    position:relative;
    width:100%;
    max-width:1536px;
    aspect-ratio:1536 / 1024;
  }
  .stage img{
    width:100%;
    height:100%;
    display:block;
    user-select:none;
    -webkit-user-drag:none;
  }

  /* unsichtbare, aber drückbare Klick-Flächen über den Buttons im Bild */
  .hit{
    position:absolute;
    cursor:pointer;
    background:rgba(255,255,255,0);
    transition:transform .08s ease, background .08s ease;
    border-radius:2%;
  }
  .hit:active,
  .hit.pressed{
    transform:scale(0.95) translateY(3px);
  }
  .hit:focus-visible{
    outline:3px solid #fff;
    outline-offset:2px;
  }

  /* kleines "Kopiert!"-Badge über dem Kopieren-Button */
  .toast{
    position:absolute;
    left:50%;
    top:-14px;
    transform:translate(-50%,-100%) scale(.8);
    background:#1c1c1c;
    color:#fff;
    font-size:clamp(10px, 1.3vw, 14px);
    padding:6px 10px;
    border-radius:4px;
    opacity:0;
    pointer-events:none;
    transition:opacity .15s ease, transform .15s ease;
    white-space:nowrap;
  }
  .toast.show{
    opacity:1;
    transform:translate(-50%,-130%) scale(1);
  }

  /* Impressum-Knopf unten links */
  .imprint-btn{
    position:absolute;
    left:2%;
    bottom:2%;
    width:6%;
    aspect-ratio:1/1;
    min-width:34px;
    min-height:34px;
    border-radius:50%;
    background:#2b2b2b;
    color:#fff;
    border:2px solid #eee;
    font-family:inherit;
    font-weight:bold;
    font-size:clamp(14px, 2vw, 20px);
    line-height:1;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    box-shadow:0 3px 0 rgba(0,0,0,.5);
    transition:transform .08s ease;
    z-index:5;
  }
  .imprint-btn:hover{background:#3a3a3a;}
  .imprint-btn:active,
  .imprint-btn.pressed{
    transform:scale(0.92) translateY(2px);
    box-shadow:0 1px 0 rgba(0,0,0,.5);
  }
  .imprint-btn:focus-visible{
    outline:3px solid #fff;
    outline-offset:2px;
  }

  /* Impressum-Overlay */
  .imprint-overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.65);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
    opacity:0;
    pointer-events:none;
    transition:opacity .15s ease;
    z-index:10;
  }
  .imprint-overlay.open{
    opacity:1;
    pointer-events:auto;
  }
  .imprint-box{
    background:#1c1c1c;
    color:#eee;
    max-width:520px;
    width:100%;
    max-height:80vh;
    overflow-y:auto;
    padding:26px 24px;
    border-radius:6px;
    border:2px solid #444;
    font-family:sans-serif;
    line-height:1.5;
    position:relative;
  }
  .imprint-box h2{
    margin:0 0 14px;
    font-size:1.2rem;
  }
  .imprint-box p{margin:0 0 10px; font-size:.92rem;}
  .imprint-close{
    position:absolute;
    top:10px;
    right:10px;
    background:transparent;
    border:none;
    color:#eee;
    font-size:1.3rem;
    cursor:pointer;
    padding:4px 10px;
  }
  .imprint-close:hover{color:#fff;}
</style>
</head>

<script>
  const copyBtn = document.getElementById('copyBtn');
  const toast = document.getElementById('toast');
  const serverIp = 'donutsmp.net'; // 🔧 HIER Server-IP anpassen, falls sie sich ändert

  copyBtn.addEventListener('click', async () => {
    try{
      await navigator.clipboard.writeText(serverIp);
    }catch(e){
      const ta = document.createElement('textarea');
      ta.value = serverIp;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
    }
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1200);
  });

  // Impressum öffnen / schließen
  const imprintBtn = document.getElementById('imprintBtn');
  const imprintOverlay = document.getElementById('imprintOverlay');
  const imprintClose = document.getElementById('imprintClose');

  function openImprint(){ imprintOverlay.classList.add('open'); }
  function closeImprint(){ imprintOverlay.classList.remove('open'); }

  imprintBtn.addEventListener('click', openImprint);
  imprintClose.addEventListener('click', closeImprint);
  imprintOverlay.addEventListener('click', e => {
    if(e.target === imprintOverlay) closeImprint();
  });
  document.addEventListener('keydown', e => {
    if(e.key === 'Escape') closeImprint();
  });

  // Tastatur-Bedienung: Enter/Space visuell wie ein Klick behandeln
  document.querySelectorAll('.hit').forEach(el => {
    el.addEventListener('keydown', e => {

    });
    el.addEventListener('keyup', () => el.classList.remove('pressed'));
  });
