<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blueprint's Masters</title>
<style>
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#0d0d0d;
    font-family:sans-serif;
  }

  /* Wrapper hält das Seitenverhältnis des Bildes (1536 x 1024) fest,
     damit die %-Positionen der Buttons bei jeder Bildschirmgröße stimmen */
  .stage{
    position:relative;
    width:100%;
    max-width:1536px;
    aspect-ratio:1536 / 1024;
  }
  .stage img{
    width:100%;
    height:100%;
    display:block;
    user-select:none;
    -webkit-user-drag:none;
  }

  /* unsichtbare, aber drückbare Klick-Flächen über den Buttons im Bild */
  .hit{
    position:absolute;
    cursor:pointer;
    background:rgba(255,255,255,0);
    transition:transform .08s ease, background .08s ease;
    border-radius:2%;
  }
  .hit:hover{
    background:rgba(255,255,255,.10);
  }
  .hit:active,
  .hit.pressed{
    transform:scale(0.95) translateY(3px);
    background:rgba(0,0,0,.25);
  }
  .hit:focus-visible{
    outline:3px solid #fff;
    outline-offset:2px;
  }

  /* kleines "Kopiert!"-Badge über dem Kopieren-Button */
  .toast{
    position:absolute;
    left:50%;
    top:-14px;
    transform:translate(-50%,-100%) scale(.8);
    background:#1c1c1c;
    color:#fff;
    font-size:clamp(10px, 1.3vw, 14px);
    padding:6px 10px;
    border-radius:4px;
    opacity:0;
    pointer-events:none;
    transition:opacity .15s ease, transform .15s ease;
    white-space:nowrap;
  }
  .toast.show{
    opacity:1;
    transform:translate(-50%,-130%) scale(1);
  }
</style>
</head>
<body>

<div class="stage">
  <img src="ui.png" alt="Blueprint's Masters – Discord, YouTube, TikTok, Twitch, Server IP">

  <!-- 🔗 DISCORD -->
  <a class="hit" style="left:34.2%; top:29.3%; width:30.6%; height:8%;"
     href="https://discord.gg/DEIN-INVITE" target="_blank" rel="noopener" aria-label="Discord beitreten"></a>

  <!-- 🔗 YOUTUBE – LINKE Seite -->
  <a class="hit" style="left:27%; top:40.5%; width:21.5%; height:8%;"
     href="https://youtube.com/@DEIN-KANAL-1" target="_blank" rel="noopener" aria-label="YouTube links"></a>

  <!-- 🔗 YOUTUBE – RECHTE Seite -->
  <a class="hit" style="left:51.5%; top:40.5%; width:21.5%; height:8%;"
     href="https://youtube.com/@DEIN-KANAL-2" target="_blank" rel="noopener" aria-label="YouTube rechts"></a>

  <!-- 🔗 TIKTOK – LINKE Seite -->
  <a class="hit" style="left:27%; top:50.8%; width:21.5%; height:8%;"
     href="https://tiktok.com/@DEIN-TIKTOK-1" target="_blank" rel="noopener" aria-label="TikTok links"></a>

  <!-- 🔗 TIKTOK – RECHTE Seite -->
  <a class="hit" style="left:51.5%; top:50.8%; width:21.5%; height:8%;"
     href="https://tiktok.com/@DEIN-TIKTOK-2" target="_blank" rel="noopener" aria-label="TikTok rechts"></a>

  <!-- 🔗 TWITCH – LINKE Seite -->
  <a class="hit" style="left:27%; top:61.1%; width:21.5%; height:8%;"
     href="https://twitch.tv/DEIN-TWITCH-1" target="_blank" rel="noopener" aria-label="Twitch links"></a>

  <!-- 🔗 TWITCH – RECHTE Seite -->
  <a class="hit" style="left:51.5%; top:61.1%; width:21.5%; height:8%;"
     href="https://twitch.tv/DEIN-TWITCH-2" target="_blank" rel="noopener" aria-label="Twitch rechts"></a>

  <!-- KOPIEREN-Button (kopiert die Server-IP in die Zwischenablage) -->
  <button class="hit" id="copyBtn" type="button"
     style="left:62.2%; top:81.8%; width:11%; height:6%; border:none; padding:0;" aria-label="Server IP kopieren">
     <span class="toast" id="toast">Kopiert!</span>
  </button>

</div>

<script>
  const copyBtn = document.getElementById('copyBtn');
  const toast = document.getElementById('toast');
  const serverIp = 'donutsmp.net'; // 🔧 HIER Server-IP anpassen, falls sie sich ändert

  copyBtn.addEventListener('click', async () => {
    try{
      await navigator.clipboard.writeText(serverIp);
    }catch(e){
      const ta = document.createElement('textarea');
      ta.value = serverIp;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
    }
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1200);
  });

  // Tastatur-Bedienung: Enter/Space visuell wie ein Klick behandeln
  document.querySelectorAll('.hit').forEach(el => {
    el.addEventListener('keydown', e => {
      if(e.key === 'Enter' || e.key === ' ') el.classList.add('pressed');
    });
    el.addEventListener('keyup', () => el.classList.remove('pressed'));
  });
</script>

</body>
</html>
